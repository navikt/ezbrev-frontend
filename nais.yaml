image: "docker.adeo.no:5000/dok/ezbrev-frontend"
replicas:
  min: 1
  max: 2
  cpuThresholdPercentage: 50
port: 8080
healthcheck:
  liveness:
    path: internal/isAlive
    initialDelay: 30
    failureThreshold: 10
  readiness:
    path: internal/isReady
    initialDelay: 30
    timeout: 3
prometheus:
  enabled: true
  path: /prometheus
resources:
  limits:
      cpu: 1000m
      memory: 1024Mi
  requests:
      cpu: 250m
      memory: 512Mi
fasitResources:
  used:
  - alias: ezbrev-host
    resourceType: baseurl
    propertyMap:
      url: ezbrev-host
